# Portainer-ready: alle configuratie staat inline, er is geen .env nodig.
# Plak dit als stack in Portainer (Stacks -> Add stack) of wijs naar deze repo.
#
# Andere poort? Pas dan PORT én beide kanten van de ports-mapping aan
# (compose vult ${...} niet uit het environment-blok).
services:
  ovapi-departures:
    image: ghcr.io/lucasplug/ovapi-departures-proxy:latest
    container_name: ovapi-departures
    restart: unless-stopped
    # Lichte hardening: de service heeft geen extra privileges of schrijfbare
    # bestandslaag nodig; /tmp is een tmpfs voor het geval een lib er iets kwijt wil.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.50
    environment:
      # TimingPointCode: 54460130 = Katwijk, Gemeentehuis richting Den Haag CS
      OVAPI_TPC: "54460130"
      # Fair use richting OVapi: minimaal 60, default 180 (seconden)
      POLL_INTERVAL_SECONDS: "180"
      USER_AGENT: "ovapi-departures-proxy/1.0 (+https://github.com/lucasplug/ovapi-departures-proxy)"
      PORT: "8000"
      # Alleen deze lijnen tonen (comma-separated); leeg = alle lijnen
      LINE_FILTER: "385"
      # Maximum aantal vertrekken in /departures; 0 = onbeperkt
      LIMIT: "4"
      TZ: "Europe/Amsterdam"
    ports:
      - "8000:8000"
